name: deploy-gate

on:
  workflow_call:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable pnpm
        run: |
          set -euo pipefail
          corepack enable
          for attempt in 1 2 3; do
            if corepack prepare pnpm@9.15.0 --activate; then
              pnpm -v
              exit 0
            fi
            if [[ "${attempt}" -lt 3 ]]; then
              sleep $((attempt * 5))
            fi
          done
          echo "::warning::corepack prepare failed after retries; falling back to npm global install."
          npm install --global pnpm@9.15.0
          pnpm -v

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify NP0 tasks are DONE
        run: pnpm gate:deploy

      - name: Lint
        run: pnpm lint

      - name: Test (CI)
        run: pnpm test:ci

      - name: Build
        run: pnpm build

      - name: Lighthouse CI handled by dedicated workflow
        run: echo "Skipping lighthouse in deploy-gate; use lighthouse-ci workflow for performance audits."

      - name: Security audit
        run: pnpm security:scan
