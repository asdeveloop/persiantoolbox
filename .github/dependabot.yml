version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "05:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - security
    commit-message:
      prefix: "chore(deps)"
    groups:
      next-stack:
        patterns:
          - "next"
          - "react"
          - "react-dom"
      testing-stack:
        patterns:
          - "vitest*"
          - "@playwright/*"
          - "@testing-library/*"
          - "@axe-core/*"
      lint-and-types:
        patterns:
          - "eslint*"
          - "@typescript-eslint/*"
          - "typescript"
      storybook:
        patterns:
          - "@storybook/*"
          - "storybook"
    ignore:
      - dependency-name: "vitest"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@vitest/*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@playwright/*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@testing-library/*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@axe-core/*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
      - dependency-name: "eslint-*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@typescript-eslint/*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@storybook/*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "storybook"
        update-types: ["version-update:semver-major"]
      - dependency-name: "pdfjs-dist"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "05:30"
      timezone: "UTC"
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: "chore(ci)"
